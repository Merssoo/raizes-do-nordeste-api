spring:
  application:
    name: raizes-do-nordeste-api
  datasource:
    url: jdbc:postgresql://localhost:5432/raizes_nordeste
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: false
  mvc:
    log-request-details: true
    servlet:
      path: /raizes/api

logging:
  level:
    root: INFO
    com.raizesdonordeste: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080

app:
  admin-secret-key: MinhaChaveSecreta123
